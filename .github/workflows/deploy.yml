name: Deploy to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'wp-content/themes/**'
      - 'wp-content/plugins/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy themes via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wp-content/themes/
          server-dir: /domains/museumpunks.com/public_html/wp-content/themes/
          state-name: .themes-sync-state.json

      - name: Deploy plugins via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wp-content/plugins/
          server-dir: /domains/museumpunks.com/public_html/wp-content/plugins/
          state-name: .plugins-sync-state.json
